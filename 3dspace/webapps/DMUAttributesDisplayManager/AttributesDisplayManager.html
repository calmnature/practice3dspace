<?xml version="1.0" encoding="utf-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" />
<html>
  <head>
    <!-- Application Metas -->
    <title>Requirements Attributes Display Manager</title>
    <meta name="author" content="Dassault Systèmes" />
    <meta name="brand" content="ENOVIA" />
    <meta name="autoRefresh" content="0" />
    <meta name="description" content="ENOVIA Product Structure Explorer Grid Customization" />
    <link rel="stylesheet" type="text/css" href="../Core/wux.css" />
    <script type="text/javascript" src="../AmdLoader/AmdLoader.js"></script>
    <script type="text/javascript">
      let _iframeContentWindow = null,
        _mepOrigin = null,
        _preferenceValue = null,
        _dmuADMgr = null;
      window.addEventListener('message', function (e) {
        let data = e.data,
          eventName = '';
        if (data && data.message) eventName = data.message;
        if (eventName == 'com.ds.mep:CustomDialogReady_msg') {
          _iframeContentWindow = e.source;
          _mepOrigin = e.origin;
          _preferenceValue = data.jsonData;
          let tenantID = data.tenantID,
            compassConfig = data.compassConfig;
          require.config({ locale: compassConfig.lang });
          require(['DS/DMUAttributesDisplayManager/AttributesDisplayManager'], function (AttributesDisplayManager) {
            'use strict';
            _dmuADMgr = new AttributesDisplayManager({
              localWindow: window,
              frameCntWindow: _iframeContentWindow,
              mepOrigin: _mepOrigin,
              preferenceValue: JSON.parse(_preferenceValue),
              targetId: 'DMUAttributesDisplayManager',
              tenantID: tenantID,
              compassConfig: compassConfig
            });
            _dmuADMgr.initialize();
          });
        }
      });
    </script>
  </head>

  <body>
    <div id="DMUAttributesDisplayManager"></div>
  </body>
</html>
