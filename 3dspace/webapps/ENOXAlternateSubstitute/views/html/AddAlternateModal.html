<div class="enox-addAlternate">

{{#if contextLabel}}  <div class="enox-addAlternate-context-text"> </div> {{/if}}

{{#if autocomplete}} <div class="enox-addAlternate-autocomplete"> {{/if}} </div>


{{#if suggestionlink}} <div class="enox-addAlternate-suggestion-link">  </div>{{/if}}
  {{#if alternateType}}<div class="enox-addAlternate-type-wraper">
    <div class="enox-addAlternate-type-label"></div>
    <div class="enox-addAlternate-type-dropDown"></div>
  </div>{{/if}}
<div class="enox-addAlternate-context-wrapper">
{{#if alternateContextHeader}} <div class="enox-addAlternate-context-header">
  <span class="enox-addAlternate-context-header-label"> </span>
  <span class="enox-addAlternate-context-header-info fonticon fonticon-help "> </span>
{{/if}}
</div>

{{#if alternateContext}} <div class="enox-addAlternate-context">
  <div class="enox-addAlternate-context-selection-all"></div>
  <div class="enox-addAlternate-context-selection-reference"></div>
  <div class="enox-addAlternate-context-selection-instance"></div>
{{/if}}
</div>

<div class="enox-addAlternate-additionalOptions">
  <span class="enox-addAlternate-additionalOptions-label"> </span>
</div>
<div class="enox-addAlternate-additionalOptions-container">
  <div class="enox-addAlternate-restrictUsage-wrapper">
    <div class="enox-addAlternate-selection-restrictUsage"></div>
    <span class="enox-addAlternate-restrictUsage-info fonticon fonticon-help "> </span>
    <div class="enox-addAlternate-restrictUsage-dropDown"></div>
  </div>
  <div class="enox-addAlternate-allOrNothing-wrapper">
    <div class="enox-addAlternate-selection-allOrNothing"></div>
    <span class="enox-addAlternate-allOrNothing-info fonticon fonticon-help "> </span>
</div>
</div>
</div>
