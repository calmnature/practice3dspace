# For preparing error code from modeler NLS messages
dsbks.Error.MsgChangeContentFrozen=Olgunluk durumu nedeniyle bu Yer \u0130\u015fareti Klas\u00f6r\u00fc'n\u00fcn i\u00e7eri\u011fini de\u011fi\u015ftiremezsiniz.  L\u00fctfen i\u00e7eri\u011fin de\u011fi\u015ftirilmesine izin veren bir duruma d\u00fc\u015f\u00fcr\u00fcn. 
dsbks.Error.MsgNoChangeContentAccess=Bu Yer \u0130\u015fareti Klas\u00f6r\u00fc'n\u00fcn i\u00e7eri\u011fini de\u011fi\u015ftirmek i\u00e7in gerekli g\u00fcvenlik ba\u011flam\u0131n\u0131z yok.
dsbks.Error.links.UriAlreadyExists=Bu referansta %1 i\u015flemi yapamazs\u0131n\u0131z \u00e7\u00fcnk\u00fc i\u00e7erdi\u011fi URL hedef Yer \u0130\u015fareti Klas\u00f6r\u00fc'nde zaten mevcut.
dsbks.Error.links.InvalidUriPattern=Ba\u011flant\u0131 i\u00e7in ge\u00e7ersiz e\u015fle\u015fme dizesi belirtildi. Ge\u00e7erli e\u015fle\u015fme dizeleri i\u00e7in belgeleri kontrol edin.
dsbks.Error.links.NoAddRemoveModifyLinkAccess=Bu Yer \u0130\u015fareti Klas\u00f6r\u00fc'n\u00fcn ba\u011flant\u0131lar\u0131n\u0131 eklemek, kald\u0131rmak veya de\u011fi\u015ftirmek i\u00e7in gerekli eri\u015fiminiz yok.
