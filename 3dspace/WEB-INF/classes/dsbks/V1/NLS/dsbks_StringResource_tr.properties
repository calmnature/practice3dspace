dsbks.Error.FromdisconnectAccessOnContent=Bu Yer \u0130\u015fareti Klas\u00f6r\u00fc'nden bir nesneyi ay\u0131rmak i\u00e7in hedef i\u015f birli\u011fi alan\u0131nda gerekli sorumlulu\u011fa sahip de\u011filsiniz.
dsbks.Error.TypeNotSupported=Bu nesne tipi desteklenmiyor.
