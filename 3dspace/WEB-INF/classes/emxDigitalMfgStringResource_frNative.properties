OOTBParameterization.DigitalManufacturing.MfgItemsBehavior.AllowSameEINForServiceItemsCheckbox.AllowSameEINForServiceItemsArg=Autoriser le même numéro d'élément d'entreprise pour les éléments de service en fonction des liens de portée
