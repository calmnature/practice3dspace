OOTBParameterization.VRP.VRPParameters.ContainsScripts.Argument=ЕЧҪәЖ® »з·КёҰ өҝ°бөК ¶ЗҙВ ёұё®БоөК »уЕВ·О ҪВ°ЭЗП·Бёй ЗПіӘ АМ»уАЗ ҝ¬°бөИ ЕЧҪәЖ® ҪәЕ©ёіЖ®°Ў ЗКҝдЗХҙПҙЩ. ҝ¬°бөИ °ў ЕЧҪәЖ® ҪәЕ©ёіЖ®АЗ јәјчөө »уЕВҙВ ЕЧҪәЖ® »з·КАЗ ҙл»у јәјчөө »уЕВҝН °°°ЕіӘ ҙх іфҫЖҫЯ ЗХҙПҙЩ.
