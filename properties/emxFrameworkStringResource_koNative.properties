OOTBParameterization.VRP.VRPParameters.ContainsRequirements.Argument=ЕЧҪәЖ® »з·КёҰ өҝ°бөК ¶ЗҙВ ёұё®БоөК »уЕВ·О ҪВ°ЭЗП·Бёй ЗПіӘ АМ»уАЗ ҝ¬°бөИ ҝдұё »зЗЧАМ ЗКҝдЗХҙПҙЩ. ҝ¬°бөИ °ў ҝдұё »зЗЧАЗ јәјчөө »уЕВҙВ ЕЧҪәЖ® »з·КАЗ ҙл»у јәјчөө »уЕВҝН °°°ЕіӘ ҙх іфҫЖҫЯ ЗХҙПҙЩ.
