Error.xRevision.ErrorInCreateComposition=Ocorreu um erro durante a criação ou atualização da composição.
Error.xRevision.InvalidWorkUnderProvidedInInput =  O trabalho em fornecido na entrada não é válido.

Error.xRevision.GenericErrorMessage=Falha detectada durante a operação.

Error.xRevision.MandatoryAttributeVersion=A versão do atributo deve estar presente na entrada e seu valor deve ser 1.0.
