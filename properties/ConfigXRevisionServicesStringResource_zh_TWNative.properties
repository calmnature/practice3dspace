Error.xRevision.AttributeVersionIsNotPresent=輸入中不存在屬性版本。
Error.xRevision.AttributeVersionIsInvalid=屬性版本值無效。有效值為 1.0。

Error.xRevision.AttributeVersionReferencePIDNotPresent=輸入中不存在屬性 referencePID。
Error.xRevision.AttributeVersionReferencePIDNotInvalid=輸入中的屬性 referencePID 為空值或空白。
Error.xRevision.CannotCreateXRevGraphItIsAlreadyExist=無法在此參考上建立 XRevision 圖形，因為已附加至該參考。
Error.xRevision.CannotCreateXRevGraphModelAttached=無法在此參考上建立 XRevision 圖形，因為已有模型附加至該參考。

Error.xRevision.AttributeXRevElementPIDIsNotPresent=輸入中不存在屬性 xRevisionElementPID。
Error.xRevision.AttributeXRevElementPIDNullOREmpty=輸入中的屬性 xRevisionElementPID 為空值或空白。
Error.xRevision.AttributeXRevElementPIDNotValid=輸入中的 xRevision 元素實體 ID 無效。

Error.xRevision.AttributeAllocationsIsNotPresent=輸入中不存在屬性配置。
Error.xRevision.AttributeAllocationsIsNullOREmpty=輸入中的屬性配置為空值或空白。
Error.xRevision.AttributeAllocationPIDsIsNotPresent=輸入中不存在屬性 allocationPIDs。
Error.xRevision.AttributeAllocationPIDsIsNullOREmpty=輸入中的屬性 allocationPIDs 為空值或空白。
Error.xRevision.AtleastOneAllocationPIDIsNullOREmpty=輸入中至少有一個配置實體 ID 為空值或空白。
Error.xRevision.MultiAllocationIsNotSupported=尚未支援對每個 xRevision 元素進行多重配置。
Error.xRevision.AllocationPIDIsNotValid=輸入中提供的配置無效，或不是 xRevision 圖形一部分。
Error.xRevision.xRevElementAlreadyHasAllocation=xRevision 元素已有配置 。

Error.xRevision.AttributeXRevElementPIDSIsNotPresent=輸入中不存在屬性 xRevisionElementPIDs。
Error.xRevision.AttributeXRevElementPIDSNullOREmpty=輸入中的屬性 xRevisionElementPIDs 為空值或空白。
Error.xRevision.AtleastOneXRevElementPIDIsNullOREmpty=輸入中至少有一個 xRevision 元素實體 ID 為空值或空白。
Error.xRevision.XRevisionElementPIDNotValid=此 xRevision 元素實體 ID 無效。

Error.xRevision.AttributeDeallocationsIsNotPresent=輸入中不存在屬性解除配置。
Error.xRevision.AttributeDeallocationsIsNullOREmpty=輸入中的屬性解除配置為空值或空白。
Error.xRevision.AttributeDeallocationPIDsIsNotPresent=輸入中不存在屬性 deallocationPIDs。
Error.xRevision.AttributeDeallocationPIDsIsNullOREmpty=輸入中的屬性 deallocationPIDs 為空值或空白。
Error.xRevision.AtleastOneDeallocationPIDIsNullOREmpty=輸入中至少有一個解除配置實體 ID 為空值或空白。
Error.xRevision.MultiDeallocationIsNotSupported=尚未支援從每個 xRevision 元素進行多重解除配置。
Error.xRevision.DeallocationPIDIsNotValid=輸入中提供的解除配置無效，或不是 xRevision 圖形一部分。
Error.xRevision.xRevElementDoesNotHaveAllocation=此 xRevision 元素沒有任何配置。

Error.xRevision.AttributexRevGraphsToAttachIsNotPresent=輸入中不存在屬性 xRevisionGraphsToAttach。
Error.xRevision.AttributexRevGraphsToAttachIsEmpty=輸入中的屬性 xRevisionGraphsToAttach 為空白。
Error.xRevision.AttributeReusableGraphReferenceIsNotPresent=輸入中不存在屬性 reusableGraphReferencePID。
Error.xRevision.AttributeReusableGraphReferenceIsEmpty=輸入中的屬性 reusableGraphReferencePID 為空值或空白。
Error.xRevision.AttachExistingXRevGraphFailed=將現有 xRevision 圖形從一個參考附加至另一參考時，因為輸入中的其中一個參考而失敗。
Error.xRevision.CannotAttachXRevGraphItIsAlreadyExist=無法為其中一個參考附加 XRevision 圖形，因為該參考已有 XRevision 圖形。
Error.xRevision.AllocationCrossesExistingOne=此配置與現有配置重疊。請嘗試配置比該版本更新的模型版本。
Error.xRevision.ErrorUnableToPerformAutoAllocationDuringSetScope=在設定範圍操作期間，無法執行自動配置。
Error.xRevision.ErrorNoVariantsFoundDuringSetScope=在設定範圍操作期間，找不到模型組態關聯變體。


Error.xRevision.ParentNotInFrozen=目前的 xRevision 元素父項為「初步」或「工作中」狀態，禁止升級。
Error.xRevision.AllocatedMVNotReleased=配置至目前 xRevision 元素的模型版本尚未發佈，禁止升級。
Error.xRevision.FoundIncompleteChange=使用此 xRevision 元素的變更動作不完整，禁止升級。
Error.xRevision.ChildFrozen=目前 xRevision 元素的子項至少為「已凍結」狀態，禁止降級。

Error.xRevision.xRevisionDeleteAction=無法刪除 xRevision 圖形的其中一個元素，或是無法設定主要參考。
Error.xRevision.PrimaryReferenceDelete=禁止嘗試刪除圖形的主要參考。
Error.xRevision.PrimaryReferenceDeleteMulti=禁止嘗試刪除具有多個 xRevision 元素圖形的主要參考。
Error.xRevision.DeleteCollabSpace=xRevision 元素不在「工作中」狀態，也不是處於與使用者相同的協同作業空間，禁止刪除。
Error.xRevision.FrozenxRev=xRevision 元素的狀態過於進階，不允許刪除。
Error.xRevision.DeleteIsComposition=xRevision 元素為其他圖形的組合，禁止刪除。
Error.xRevision.DeleteOneSingleElement=超過一個參考正在使用此包含單一元素的圖形，不允許刪除。
Error.xRevision.DeleteFirstElement=超過一個參考正在使用此圖形，不允許刪除第一個元素。
Error.xRevision.DeleteOneElement=已使用一個 xRevision 元素且無法刪除。
Error.xRevision.NotLeaf=xRevision 元素不是圖形中的葉，不允許刪除。
Error.xRevision.ReferenceDeleteChildScope=禁止嘗試刪除具有子圖形之圖形的參考。
Error.xRevision.GraphDeleteChildScope=禁止刪除具有子圖形的圖形。
Error.xRevision.CreateGraphPhyRevs=無法為目前項目建立圖形，因其已有實體修訂版。
Error.xRevision.CreateGraphNoExistCfg=無法為目前項目建立圖形，因其不存在或無法設定。
Error.xRevision.ReuseGraphDelSource=無法為目前項目重複使用現有圖形，因來源項目不存在。
Error.xRevision.ReuseGraphSourceNoAccess=無法為目前項目重新使用現有圖形，因目前的使用者沒有權限存取來源項目。
Error.xRevision.ReuseGraphSourceNoCfg=無法為目前項目重新使用現有圖形，因無法設定來源項目。
Error.xRevision.ReuseGraphSourceNoGraph=無法為目前項目重新使用現有圖形，因來源項目沒有圖形。

Error.xRevision.DeallocationLeadsToGapInAllocTable=無法解除配置此元素，因為其上代和至少其中一個後代已配置

Error.xRevision.SameGraphToSourceAndTargetItem=目標項目和來源項目均附加相同的 xRevision 圖形。
Error.xRevision.CyclingConditionForComposition=因產生循環條件而無法產生組合。
Error.xRevision.TargetRevisionIsNotExist=輸入中提供的目標修訂版不存在。
Error.xRevision.TargetItemNotEffectivityBased=輸入中提供的目標項目並非基於有效性。
Error.xRevision.TargetItemNotConfigurable=輸入中提供的目標項目無法設定。
Error.xRevision.NoInstanceInSourceAndTargetItem=在來源項目和目標項目之間找不到例項。
Error.xRevision.NoWorkUnderProvidedInInput=輸入中提供的 (製作關聯) 之下沒有工作。
Error.xRevision.ErrorInCreateComposition=產生或更新組合時發生錯誤。
Error.xRevision.InvalidWorkUnderProvidedInInput = 輸入中提供的下方工作無效。

Error.xRevision.GenericErrorMessage=操作期間偵測到失敗。

Error.xRevision.MandatoryAttributeVersion=輸入中應有屬性版本，而其數值應為 1.0。
Error.xRevision.MandatoryAttributeSourceItemPID=輸入中應有屬性 sourceItemPID，而其數值不可為空值或空白。
Error.xRevision.MandatoryAttributeTargetItemPID=輸入中應有屬性 targetItemPID，而其數值不可為空值或空白。
Error.xRevision.MandatoryAttributeTargetRevision=輸入中應有屬性 targetRevision，而其數值不可為空值或空白。

