#dsbks NLS properties


dsbks.Streams.MissingParamter=輸入參數「%1」遺失。
dsbks.Streams.EmptyParamter=輸入參數「%1」不能空白。
dsbks.Streams.NonArrayParamter=輸入參數「%1」必須為有效物件參考的陣列。
dsbks.Streams.NonObjectParamter=輸入參數「%1」必須為物件。
dsbks.Message.LimitedItems=僅允許最多 %1 個物件。
dsbks.Message.ObjectNotExist=指定物件不存在 (或) 使用者沒有該物件的存取權。
dsbks.Message.ObjectsNotExist=部分物件不存在 (或) 使用者對其無存取權。
dsbks.Message.ObjectNotClassified=指定物件未加入書籤。
dsbks.Error.NotBookmark=舊有書籤資料夾的製作操作未經授權。
dsbks.Error.NotValidBookmark=指定書籤資料夾不存在 (或) 使用者沒有該物件的存取權。
dsbks.Error.NotPublicItem=僅公開物件可用於製作操作。
dsbks.Message.Deleted=書籤資料夾已成功刪除。
dsbks.Error.Invalid.inheritedAccess=通過 inheritedAccess 無效值。
dsbks.Error.NoCreateAccess=您不具建立書籤資料夾的存取權限。

dsbks.Error.ObjectAlreadyConnected=物件已連接。
dsbks.Error.NoToconnectAccessOnContent=您沒有在目標協同作業空間將此物件附加至書籤資料夾的所需責任。
dsbks.Error.NoTodisconnectAccessOnContent=您沒有在目標協同作業空間從書籤資料夾移除此物件的所需責任。
dsbks.Error.NoFromconnectAccessOnContent=您在目標協同作業空間未獲可將物件附加至此書籤資料夾的所需責任。
dsbks.Error.FromdisconnectAccessOnContent=您在目標協同作業空間未獲可將物件從此書籤資料夾分離的所需責任。
dsbks.Error.TypeNotSupported=不支援這類物件。
dsbks.Error.RelationsNotFound=找不到關係。無法移除內容。
dsbks.Error.LinkDoesNotExists=來源書籤資料夾中缺少了至少一個連結。
dsbks.Error.InvalidReferencedType=傳遞的 referencedType 值無效。

# For preparing error code from modeler NLS messages
dsbks.Error.MsgChangeContentFrozen=由於書籤資料夾的成熟度狀態緣故，因此您無法變更其內容。請降級至允許變更內容的狀態。 
dsbks.Error.MsgNoChangeContentAccess=您沒有可變更此書籤資料夾內容的安全性關聯。
dsbks.Error.links.UriAlreadyExists=您無法%1此參考，因為其內含的 URI 已存在於目標書籤資料夾。
dsbks.Error.links.InvalidUriPattern=指定給連結的無效模式。檢查文件的有效模式。
dsbks.Error.links.NoAddRemoveModifyLinkAccess=您沒有新增、移除或修改此書籤資料夾連結的必要存取權。
